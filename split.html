<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gracie</title>

    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="split-container">
      <!-- Left Side Panel -->
      <div class="panel left-panel" id="leftPanel">
        <h2>Left Panel</h2>
        <p>Content goes here...</p>
      </div>

      <!-- Draggable Divider Handle -->
      <div class="divider" id="dragDivider"></div>

      <!-- Right Side Panel -->
      <div class="panel right-panel">
        <h2>Right Panel</h2>
        <p>Content goes here...</p>
      </div>
    </div>

    <script>
    const leftPanel = document.getElementById('leftPanel');
    const divider = document.getElementById('dragDivider');
    let isDragging = false;

    // 1. Restore width from localStorage on page load
    const savedWidth = localStorage.getItem('split-panel-width');
    if (savedWidth) {
    leftPanel.style.width = savedWidth;
    }

    // --- MOUSE EVENTS ---
    divider.addEventListener('mousedown', function (e) {
    e.preventDefault(); 
    startDrag();
    window.addEventListener('mousemove', resizeMouse);
    window.addEventListener('mouseup', stopDrag);
    });

    // --- TOUCH EVENTS (Mobile/Tablet) ---
    divider.addEventListener('touchstart', function (e) {
    // Prevent scrolling or zooming actions while dragging the divider
    e.preventDefault(); 
    startDrag();
    window.addEventListener('touchmove', resizeTouch, { passive: false });
    window.addEventListener('touchend', stopDrag);
    });

    // 2. Common logic to initiate drag state
    function startDrag() {
    isDragging = true;
    document.body.style.cursor = 'ew-resize';
    // Optional: Prevent text selection/highlighting on mobile during drag
    document.body.style.userSelect = 'none'; 
    }

    // 3. Handle Mouse Movement
    function resizeMouse(e) {
    updateWidth(e.clientX);
    }

    // 4. Handle Touch Movement
    function resizeTouch(e) {
    if (e.touches.length > 0) {
        // e.touches[0] reads the coordinates of the first finger touching the screen
        updateWidth(e.touches[0].clientX);
    }
    }

    // 5. Unified function to calculate and update width
    function updateWidth(clientX) {
    if (!isDragging) return;

    const newWidthPercentage = (clientX / window.innerWidth) * 100;

    // Safety boundaries (10% to 90%)
    if (newWidthPercentage >= 10 && newWidthPercentage <= 90) {
        const finalWidthString = `${newWidthPercentage}%`;
        leftPanel.style.width = finalWidthString;
        localStorage.setItem('split-panel-width', finalWidthString);
    }
    }

    // 6. Clean up listeners when interaction ends
    function stopDrag() {
    if (!isDragging) return;
    isDragging = false;
    document.body.style.cursor = 'default';
    document.body.style.userSelect = 'auto';
    
    // Remove mouse events
    window.removeEventListener('mousemove', resizeMouse);
    window.removeEventListener('mouseup', stopDrag);
    
    // Remove touch events
    window.removeEventListener('touchmove', resizeTouch);
    window.removeEventListener('touchend', stopDrag);
    }
        </script>
    </body>
    </html>
