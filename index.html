<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f19">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gracie</title>

    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/style.css" />

  </head>

  <body background="img/bkd.png">
    <div class="categories-container" id="categories-container">

    </div>
    
    <div class="opcoes">
      <label><input type="checkbox" id="sort-toggle"> (A-Z)</label>
      <h id="ctgTitle"></h>
      <button id="btn-add" class="btn-add">
        <img src="img/add.svg" />
      </button>
    </div>

    <div class="list-container" id="list-container">
      <div class="panel" id="left-panel">
        <div class="items-grid" id="left-items-grid">
          <div class="empty-state">Clique em um ícone acima para ver os favoritos.</div>
        </div>
      </div>
      <div class="divider" id="split-divider"></div>
      <div class="panel" id="right-panel">
        <div class="items-grid" id="right-items-grid"></div>
      </div>
    </div>
    
    <dialog id="item-modal">
      <h3>Novo Item de Catálogo</h3>
      <form id="add-item-form">
        <div class="form-group">
          <label for="input-item-name">Nome do Item</label>
          <input type="text" id="input-item-name" required placeholder="Ex: Queijo Prato, Açúcar">
        </div>
        <div class="form-group">
          <label for="select-category">Categoria do Sistema</label>
          <select id="select-category" required></select>
        </div>
        <div class="modal-actions">
          <button type="button" id="btn-close-modal" class="btn-dialog cancel">Cancelar</button>
          <button type="submit" class="btn-dialog save">Adicionar</button>
        </div>
      </form>
    </dialog>
    <script src="app.js"></script>

  </body>
</html>
