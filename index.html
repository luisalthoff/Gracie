<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f19">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gracie</title>

    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/style.css" />

  </head>

  <body>
    <main id="app" class="app">
      <div class="header">
        <p class="titulo">Gracie</p>
        <button id="btnAdd" onclick="storageReset()" class="btnAdd">
          <img class="imgAdd" src="img/add.png" />
        </button>
      </div>
      <div id="divCtgs" class="divCtgs"></div>
      <div class="lists" id="lists">
        <div id="prepare" class="side prepare"> </div>
        <div class="divider" id="dragDivider"></div>
        <div id="shop" class="side shop"></div>
      </div>
     
      <!-- button onclick="storageReset()" class="btnReset">Limpar</button -->
      
    </main>

    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/helper.js"></script>
    <script src="js/item.js"></script>
    <script src="js/category.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

    <script>
      const container = document.getElementById('lists');
      const dragDivider = document.getElementById('dragDivider');
      let isDragging = false;

      function updateSplit(clientX) {
        const containerRect = container.getBoundingClientRect();
        let pointerX = clientX - containerRect.left;
        let percentage = (pointerX / containerRect.width) * 100;
        if (percentage < 5) percentage = 5;
        if (percentage > 95) percentage = 95;
        container.style.setProperty('--split-percent', `${percentage}%`);
      }

      const startDrag = (e) => {
        isDragging = true;
        document.body.style.cursor = 'col-resize';
      };

      dragDivider.addEventListener('mousedown', startDrag);
      dragDivider.addEventListener('touchstart', startDrag, { passive: true });

      const onDrag = (e) => {
        if (!isDragging) return;
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        updateSplit(clientX);
      };

      window.addEventListener('mousemove', onDrag);
      window.addEventListener('touchmove', onDrag, { passive: true });

      const stopDrag = () => {
        if (!isDragging) return;
        isDragging = false;
        document.body.style.cursor = '';
      };

      window.addEventListener('mouseup', stopDrag);
      window.addEventListener('touchend', stopDrag);
      
      
     </script>
  </body>
</html>
